name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Cache Node Modules & NPM Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Expo Cache
        uses: actions/cache@v4
        with:
          path: ~/.expo
          key: ${{ runner.os }}-expo-${{ hashFiles('**/eas.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Install JS Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "Skipping JS dependencies: package.json not found."
          fi

      - name: Run JS Lint
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "Skipping JS lint: No lint script found in package.json."
          fi

      - name: Run JS Type-check
        run: |
          if [ -f package.json ] && grep -q '"type-check"' package.json; then
            npm run type-check
          else
            echo "Skipping JS type-check: No type-check script found in package.json."
          fi

      - name: Run Android Lint (Native Check)
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew lintDebug || echo "Android Lint produced warnings or failed, but continuing with build."
          else
            echo "No gradlew found to run Android lint."
          fi

      - name: Build Android APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Gradle wrapper not found, attempting globally installed gradle."
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeuraLex-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Generate Build Summary
        if: always()
        run: |
          BUILD_STATUS="${{ job.status }}"
          COMMIT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          VERSION_NAME="1.0.0"
          if [ -f app/build.gradle.kts ]; then
            VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/' || echo "1.0.0")
          fi
          
          echo "### 📱 NeuraLex CI/CD Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${BUILD_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Date** | ${BUILD_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Version** | ${VERSION_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${BUILD_STATUS}" = "success" ]; then
            echo "🎉 **Build succeeded!** You can find the downloadable APK under the **Artifacts** section of the run details." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed.** Please inspect the step logs to troubleshoot compiling/testing issues." >> $GITHUB_STEP_SUMMARY
          fi
