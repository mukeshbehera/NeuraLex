name: Android APK Build

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Cache Node Modules & NPM Cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Expo Cache
        uses: actions/cache@v5
        with:
          path: ~/.expo
          key: ${{ runner.os }}-expo-${{ hashFiles('**/eas.json') }}
          restore-keys: |
            ${{ runner.os }}-expo-

      - name: Install JS Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "Skipping JS dependencies: package.json not found."
          fi

      - name: Run JS Lint
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "Skipping JS lint: No lint script found in package.json."
          fi

      - name: Run JS Type-check
        run: |
          if [ -f package.json ] && grep -q '"type-check"' package.json; then
            npm run type-check
          else
            echo "Skipping JS type-check: No type-check script found in package.json."
          fi

      - name: Set up Gradle Wrapper & Debug Keystore
        run: |
          # Generate debug keystore if not present (needed for validateSigningDebug)
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          # Restore gradle-wrapper.jar if not tracked in git
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://services.gradle.org/distributions/gradle-9.3.1-bin.zip" -o /tmp/gradle.zip
            unzip -o /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-9.3.1/bin/gradle wrapper --gradle-version 9.3.1
            rm -rf /tmp/gradle.zip /tmp/gradle
          fi
          if [ -f gradlew ]; then
            sed -i 's/\r$//' gradlew
            chmod +x gradlew
          fi

      - name: Run Android Lint (Native Check)
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew lintDebug || echo "Android Lint produced warnings or failed, but continuing with build."
          else
            echo "No gradlew found to run Android lint."
          fi

      - name: Build Android APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Gradle wrapper not found, attempting globally installed gradle."
            gradle assembleDebug --no-daemon
          fi

      - name: Rename APK for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/NeuraLex ${{ github.ref_name }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v5
        with:
          name: NeuraLex-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "app/build/outputs/apk/debug/NeuraLex ${{ github.ref_name }}.apk" --clobber

      - name: Generate Build Summary
        if: always()
        run: |
          BUILD_STATUS="${{ job.status }}"
          COMMIT_SHA="${{ github.sha }}"
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')

          VERSION_NAME="1.0.0"
          if [ -f app/build.gradle.kts ]; then
            VERSION_NAME=$(grep "versionName" app/build.gradle.kts | head -n 1 | sed -E 's/.*versionName = "([^"]+)".*/\1/' || echo "1.0.0")
          fi

          echo "### 📱 NeuraLex CI/CD Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${BUILD_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Date** | ${BUILD_DATE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Version** | ${VERSION_NAME} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${BUILD_STATUS}" = "success" ]; then
            echo "🎉 **Build succeeded!** You can find the APK attached to the release." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed.** Please inspect the step logs to troubleshoot compiling/testing issues." >> $GITHUB_STEP_SUMMARY
          fi
